<!DOCTYPE html>
<html lang="es">
<head>
<title>Los API JavaScript de HTML5</title>
<meta charset=utf-8>
<style type="text/css">		
#boxA { float: left;
        width: 250px; 
        height: 180px; 
        padding: 5px; 
        margin-right: 30px;
        border: 1px solid black;
        background-color: white;}
#boxB { float: left;
        width: 250px; 
        height: 180px; 
        padding: 5px; 
        border: 1px solid black;
        background-color: white;}
.word { width: 220px; 
        height: 16px; 
        padding: 1px; 
        margin: 3px; 
        font-weight: bold;
        background-color: white;
        display: block;}
#span1 { margin-left: 80px;}
#span2 { margin-left: 200px;}
*[draggable=true] {
-moz-user-select:none;
-khtml-user-drag: element;
cursor: move;}
</style> 
<script type="text/javascript">
function dragStart(ev) {
ev.dataTransfer.effectAllowed = 'move';
ev.dataTransfer.setData("text/plain", ev.target.getAttribute('id'));
return true;
}
function dragOver(ev) {
ev.preventDefault();
}		
function dragEnd(ev) {
return true;
}
function dragDrop(ev) {
var idDrag = ev.dataTransfer.getData("Text");
ev.target.appendChild(document.getElementById(idDrag));
ev.preventDefault();
}		
</script> 
</head> 
<body> 
<header> 
<h2>Drag and drop</h2>
</header> 		
<section> 
<h3>Seleccione sus regalos...</h3> 
<diV><span id="span1">Nuestras propuestas</span><span id="span2">Su elección</span></div>			 
<div id="boxA" ondragover="dragOver(event)" ondrop="dragDrop(event)"> 
<div id="word1" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Una tableta táctil</div> 
<div id="word2" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un salto en paracaídas</div> 
<div id="word3" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un día en Aston Martin</div> 
<div id="word4" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un curso de pilotaje</div> 
<div id="word5" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un fin de semana gastronómico</div> 
<div id="word6" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un crucero por el mediterraneo</div> 
<div id="word7" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un vuelo en helicoptero</div> 
<div id="word8" class="word" draggable="true" ondragstart="return dragStart(event)" ondragend="dragEnd(event)">Un concierto de Sting</div> 
</div>	
<div id="boxB" ondragover="return dragOver(event)" ondrop="dragDrop(event)"></div>	
</section> 		
</body>	
</html>
