<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de uso de hgroup</title>
</head>
<body>

    <article>
        <hgroup> <!-- Se utiliza en HTML para agrupar un encabezado principal con su subtítulo, lema o título alternativo. -->
            <h1>El Señor de los Anillos</h1>
            <p>La Comunidad del Anillo</p>
        </hgroup>

        <p>Este es el primer libro de la famosa saga de fantasía, donde conocemos la Comarca y comienza la gran aventura de Frodo Bolsón.</p>
    </article>

</body>
</html>
