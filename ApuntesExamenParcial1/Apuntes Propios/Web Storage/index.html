<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Notas - Web Storage</title>
</head>
<body>

    <h1>Escribe una Nota</h1>
    
    <textarea id="textoNota" placeholder="Escribe tus secretos aquí..." rows="10" cols="50"></textarea>
    <br><br>
    
    <button onclick="guardarNota()">Guardar Nota</button>

    <script>
        // 1. RECUPERAR DATOS DEL WEB STORAGE
        window.onload = function() {
            let notaGuardada = localStorage.getItem("miNotaSecreta");
            
            if (notaGuardada != null) {
                document.getElementById("textoNota").value = notaGuardada;
            }
        };

        // 2. GUARDAR DATOS EN EL WEB STORAGE
        function guardarNota() {
            let contenido = document.getElementById("textoNota").value;
            localStorage.setItem("miNotaSecreta", contenido);
            alert("¡Tu nota se ha guardado en el Web Storage!");
        }
    </script>

</body>
</html>
