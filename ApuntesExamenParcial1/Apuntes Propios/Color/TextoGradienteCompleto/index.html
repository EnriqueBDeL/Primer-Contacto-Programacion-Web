<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Textos con Gradiente Simple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <p>1. De Arriba a Abajo (Por defecto)</p>
    <h1 class="texto-gradiente arriba-abajo">Naranja arriba, Azul abajo</h1>

    <p>2. De Izquierda a Derecha</p>
    <h1 class="texto-gradiente izq-der">Naranja a la izquierda, Azul a la derecha</h1>

    <p>3. De Derecha a Izquierda</p>
    <h1 class="texto-gradiente der-izq">Naranja a la derecha, Azul a la izquierda</h1>

    <p>4. Diagonal (45 grados)</p>
    <h1 class="texto-gradiente diagonal">Naranja en la esquina, Azul en la otra</h1>

</body>
</html>
