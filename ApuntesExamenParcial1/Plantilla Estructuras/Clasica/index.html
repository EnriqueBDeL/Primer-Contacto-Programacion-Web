<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Layout con CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="container">

    <header>
        <h2>CABECERA (Header)</h2>
    </header>

    <aside class="sidebar-l">
        <p>ASIDE IZQUIERDO</p>
    </aside>

    <main>
        <h2>CONTENIDO PRINCIPAL (Main)</h2>
        <p>Al reducir la pantalla a tamaño móvil, verás cómo los asides se ponen arriba y abajo de este bloque automáticamente.</p>
    </main>

    <aside class="sidebar-r">
        <p>ASIDE DERECHO</p>
    </aside>

    <footer>
        <p>PIE DE PÁGINA (Footer)</p>
    </footer>

</body>
</html>
