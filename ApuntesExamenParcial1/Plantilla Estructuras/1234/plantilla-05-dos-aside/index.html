<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plantilla 05 - Dos Aside</title>
    <link rel="stylesheet" href="reset.css" type="text/css">
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>

    <!-- Cabecera principal del sitio -->
    <header id="cabecera">
        <h1>HEADER</h1>
    </header>

    <!-- Menú de navegación principal -->
    <nav id="menu-principal">
        <ul>
            <li><a href="#">INICIO</a></li>
            <li><a href="#">FORMULARIO</a></li>
            <li><a href="#">TABLA</a></li>
            <li><a href="#">IMAGEN</a></li>
            <li><a href="#">AYUDA</a></li>
        </ul>
    </nav>

    <!-- Zona central con dos laterales y contenido en el centro -->
    <section id="zona-central">
        <!-- Columna lateral izquierda -->
        <aside id="aside-izquierdo">
            <h2>ASIDE IZQUIERDO</h2>
            <p>Bloque lateral para menú o formulario.</p>
        </aside>

        <!-- Columna principal de contenido -->
        <section id="contenido-principal">
            <article>
                <h2>ARTICLE 1</h2>
                <p>Contenido principal en la columna central.</p>
            </article>
            <article>
                <h2>ARTICLE 2</h2>
                <p>Segundo contenido del cuerpo principal.</p>
            </article>
        </section>

        <!-- Columna lateral derecha -->
        <aside id="aside-derecho">
            <h2>ASIDE DERECHO</h2>
            <p>Bloque lateral para avisos o ayuda.</p>
        </aside>
    </section>

    <!-- Pie de página -->
    <footer id="pie">
        <p>FOOTER</p>
    </footer>

</body>
</html>
