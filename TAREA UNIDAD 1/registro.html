<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
</head>
<body>


 <form id="userForm">
        <label>Nombre Completo: <input type="text" id="name"></label><br>
        <label>Correo electrónico: <input type="email" id="email"></label><br>
        <label>Contraseña: <input type="password" id="password"></label><br>
        <label>Fecha de nacimiento: <input type="date" id="birthdate"></label><br>
        <label>Número de teléfono: <input type="tel" id="phone"></label><br>
        <label>URL de sitio web: <input type="url" id="website"></label><br>
        <label>Color favorito: <input type="color" id="color"></label><br>
        <label>Rango de experiencia en desarrollo web (1 a 10): <input type="range" id="experience" min="1" max="10" step="1" value="5"> </label><br>
        <label>Fecha de registro: <input type="date" id="registrationDate"> </label><br>
        <label>Código de identificación (Ej: ABC-1234): <input type="text" id="idCode" pattern="[A-Z]{3}-[0-9]{4}" title="Debe tener el formato: 3 letras mayúsculas, un guion y 4 números (Ej: ABC-1234)" required> </label> <br>


    <button type="submit" id="saveData">Enviar Formulario</button>

</form>


</body>

</html>
