<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubicación</title>
  </head>
  <body>
    <article>
      <header>
        <h1>Tu ubicación</h1>
      </header>
      <section>
        <p id="demo">Obteniendo coordenadas...</p>
      </section>
    </article>

    <script>
      const x = document.getElementById("demo");

      function getLocation() {
        if (navigator.geolocation) {
          // Se pasan las funciones success y error como argumentos
          navigator.geolocation.getCurrentPosition(success, error);
        } else {
          x.innerHTML = "Geolocation is not supported by this browser.";
        }
      }

      function success(position) {
        // Muestra la latitud y longitud obtenida
        x.innerHTML =
          "Latitude: " +
          position.coords.latitude +
          "<br>Longitude: " +
          position.coords.longitude;
      }

      function error(error) {
        // Manejo detallado de errores mediante switch
        switch (error.code) {
          case error.PERMISSION_DENIED:
            // Este caso cumple con el requisito de manejar la denegación
            x.innerHTML = "User denied the request for Geolocation.";
            break;
          case error.POSITION_UNAVAILABLE:
            x.innerHTML = "Location information is unavailable.";
            break;
          case error.TIMEOUT:
            x.innerHTML = "The request to get user location timed out.";
            break;
          case error.UNKNOWN_ERROR:
            x.innerHTML = "An unknown error occurred.";
            break;
        }
      }

      // Ejecutar automáticamente al cargar la página
      window.onload = getLocation;
    </script>

    <footer>
      <p>&copy; Servicio de Entrega</p>
  </body>
</html>
