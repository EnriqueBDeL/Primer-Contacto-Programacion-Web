<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubicación</title>
  </head>
  <body>
    <article>
      <header>
        <h1>Tu ubicación</h1>
      </header>
      <section>
        <p id="demo">Obteniendo coordenadas...</p>
      </section>
    </article>

    <script>
      const x = document.getElementById("demo");

      function getLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(success, error);
        } else {
          x.innerHTML =
            "La geolocalización no es compatible con este navegador.";
        }
      }

      function success(position) {
        x.innerHTML =
          "Latitud: " +
          position.coords.latitude +
          "<br>Longitud: " +
          position.coords.longitude;
      }

      function error(error) {
        switch (error.code) {
          case error.PERMISSION_DENIED:
            x.innerHTML = "El usuario denegó el acceso a la ubicación.";
            break;
          case error.POSITION_UNAVAILABLE:
            x.innerHTML = "La información de la ubicación no está disponible.";
            break;
          case error.TIMEOUT:
            x.innerHTML =
              "Se agotó el tiempo de espera para obtener la ubicación.";
            break;
          case error.UNKNOWN_ERROR:
            x.innerHTML = "Ha ocurrido un error desconocido.";
            break;
        }
      }

      window.onload = getLocation;
    </script>

    <footer>
      <p>&copy; Servicio de Entrega</p>
    </footer>
  </body>
</html>
