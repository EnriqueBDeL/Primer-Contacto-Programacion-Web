<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>
<body>

    <h1>Imagen de Cartagena</h1>

   <picture>
        <source media="(min-width:1100px)" srcset="Multimedia/CT1.jpg">
        <source media="(min-width:700px)" srcset="Multimedia/CT2.jpg">
        <source media="(min-width:500px)" srcset="Multimedia/CT3.jpg">
        <img src="Multimedia/CT4.jpg" alt="Imagen representativa del destino turístico">
    </picture>

    <br><br>

    <h1>Video de Cartagena</h1>

    <video src="Multimedia/CTV.mp4" type="video/mp4"  autoplay muted loop></video>

    <br><br>

    <h1>Audio de Cartagena</h1>

    <audio src="Multimedia/CTA.mp3" type="audio/mpeg" controls></audio>

</body>
</html>
